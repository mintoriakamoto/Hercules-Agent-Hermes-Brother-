name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Hercules — traces conversations, LLM calls, and tool usage. Opt-in via `hercules plugins enable observability/langfuse` or `hercules tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - HERCULES_LANGFUSE_PUBLIC_KEY
  - HERCULES_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
